# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macOS-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      # GCC >= 12 on Windows emits false-positive -Warray-bounds warnings
      # from Eigen's SSE intrinsics included via TMB
      # (https://gitlab.com/libeigen/eigen/-/issues/2506). Suppress on the
      # runner only; the flag must not ship in the package's Makevars.win.
      - name: Suppress Eigen array-bounds false positives (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Point R_MAKEVARS_USER at an explicit file: bash's ~ and R's
          # path.expand("~") disagree on Windows (the latter is
          # ~/Documents), so a file under ~/.R is never found by R.
          # Append to the runner's default flags rather than replacing
          # them (keeps -mfpmath=sse etc.).
          CXXF="$(R CMD config CXXFLAGS) -Wno-array-bounds"
          MV="${RUNNER_TEMP//\\//}/Makevars_user_ci"
          printf 'CXXFLAGS = %s\nCXX17FLAGS = %s\n' "$CXXF" "$CXXF" > "$MV"
          echo "R_MAKEVARS_USER=$MV" >> "$GITHUB_ENV"

      # The P3M binary of lme4 can be built against a different Matrix ABI
      # than the Matrix the runner installs; on Windows that mismatch
      # segfaults the R process inside lme4's compiled code (glmer/vcov)
      # during the cross-walk reference fits, killing the whole test run.
      # Recompiling lme4 against the installed Matrix removes the mismatch
      # (Rtools is already present - the package's own C++ compiles here).
      - name: Rebuild lme4 from source against installed Matrix (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          Rscript -e 'install.packages("lme4", type = "source", repos = "https://cloud.r-project.org")'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
        env:
          _R_CHECK_COMPILATION_FLAGS_KNOWN_: -Wno-array-bounds
