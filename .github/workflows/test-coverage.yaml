# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: test-coverage

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    # Tokenless Codecov upload via OIDC (public repo): the job mints a
    # short-lived id-token instead of a stored CODECOV_TOKEN secret.
    permissions:
      contents: read
      id-token: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov, "cobertura.xml")
          print(cov)
        shell: Rscript {0}

      # Upload the Cobertura report with the Codecov v5 action using OIDC.
      # No token is needed for this public repo; `if: always()` still attempts
      # the upload when a report was produced even if some tests failed.
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./cobertura.xml
          fail_ci_if_error: false

      - name: Show testthat output
        if: always()
        run: |
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      # Fallback in case the Codecov upload above fails: keep the raw
      # coverage report and the Cobertura XML as downloadable build artifacts.
      - name: Upload coverage report artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: |
            ${{ runner.temp }}/package
            cobertura.xml
