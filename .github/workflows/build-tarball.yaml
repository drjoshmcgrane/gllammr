# Builds the source tarball (R CMD build) and uploads it as an artifact.
# Manual-dispatch only: used to produce the CRAN submission tarball, since
# a source build needs the full toolchain plus Suggests for the vignettes.
on:
  workflow_dispatch:

name: build-tarball

jobs:
  build-tarball:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"all"'

      - name: Build source tarball
        run: |
          R CMD build .
          ls -l *.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: "*.tar.gz"
          if-no-files-found: error
