url: https://drjoshmcgrane.github.io/gllammr/

template:
  bootstrap: 5

reference:
- title: Model fitting
  desc: >
    Top-level fitting entry points (the unified `gllamm()` interface plus
    the standalone eirt/DIF/NPML/LCA fitters) and the `fit_*()` engines
    that `gllamm()` dispatches to internally but which can also be called
    directly.
  contents:
  - gllamm
  - eirt
  - dif_irt
  - npml
  - fit
  - fit_binomial
  - fit_cdm
  - fit_eirt
  - fit_irt
  - fit_lca
  - fit_mixed
  - fit_multinomial
  - fit_npml
  - fit_ordinal
  - fit_rank
  - fit_sem
  - fit_survival

- title: Family and spec constructors
  desc: >
    Family objects passed as `gllamm(family = ...)`, plus the adaptive
    quadrature integration specification used as `gllamm(integration = ...)`.
  contents:
  - ordinal
  - binomial
  - multinomial
  - irt
  - lca
  - cdm
  - sem
  - mixed_response
  - ranking
  - survival_family
  - aghq

- title: Methods and diagnostics
  desc: >
    Extractors, plots, model comparison, and diagnostic/testing helpers for
    fitted `gllammr` models.
  contents:
  - VarCorr
  - abilities
  - fixef
  - ranef
  - icc
  - gof.gllamm
  - predict_difficulty
  - find_outliers
  - plot_classification_uncertainty
  - plot_item_covariates
  - plot_ordinal_effects
  - dif_plot
  - dif_test
  - dif_test_with_data
  - compare_eirt
  - compare_models
  - latent_structure_comparison
  - eirt_r_squared
  - test_item_covariates
  - test_proportional_odds

- title: Validation and utilities
  desc: >
    Cross-package validation harness.
  contents:
  - gllammr_validate

- title: Internal
  desc: >
    S3 methods (print/plot/predict/simulate/coef/VarCorr/... implementations
    for each model class) and unexported helper functions. Documented for
    maintainer reference but not part of the public modeling API described
    in the sections above.
